name: Deploy PerfumeCloud Frontend

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- PASSO DE DEBUG ---
      - name: Debug - Listar arquivos na raiz do repositório
        run: |
          echo "Listando arquivos no runner do GitHub:"
          ls -R
      # ----------------------
      - name: Deploy para Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: "marketplacemanagement"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: "./"
