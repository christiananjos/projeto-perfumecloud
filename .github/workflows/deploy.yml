name: Deploy PerfumeCloud Frontend

on:
  push:
    branches: ["main"] # Ajuste se a sua branch for outra

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy para Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: "marketplacemanagement"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: "." # Envia tudo o que está na raiz
