name: Deploy PerfumeCloud Frontend

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy para Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: "marketingplacemanagement-hzhygwdfaxfnbnga"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: "." # Copia a raiz do repositório para o servidor
