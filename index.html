<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PerfumeCloud Pro</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☁️</text></svg>">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body class="h-screen overflow-hidden bg-[#f8fafc]">
    <div id="app" class="h-full">
        <login-view v-if="!session" @logged="onLogin"></login-view>

        <div v-else class="flex h-full w-full relative">

            <button v-if="!menuAberto" @click="menuAberto = true"
                class="lg:hidden fixed top-4 left-4 z-50 w-12 h-12 bg-white rounded-xl shadow-lg flex items-center justify-center text-blue-600 border border-gray-100 animate-fade-in">
                <i class="fa-solid fa-bars"></i>
            </button>

            <div v-if="menuAberto" @click="menuAberto = false"
                class="lg:hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-30"></div>

            <aside :class="menuAberto ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'"
                class="fixed lg:static inset-y-0 left-0 w-72 bg-white border-r border-gray-100 flex flex-col shadow-xl z-40 transition-transform duration-300 ease-in-out">

                <div class="p-8 font-bold text-xl flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                        <i class="fa-solid fa-cloud"></i>
                    </div>
                    PerfumeCloud
                </div>

                <nav class="flex-1 px-4 space-y-2">
                    <button v-for="t in menu" @click="navegar(t.id)"
                        :class="telaAtual === t.id ? 'bg-blue-50 text-blue-600' : 'text-gray-400 hover:bg-gray-50'"
                        class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold transition-all">
                        <i :class="t.icon"></i> {{ t.label }}
                    </button>
                </nav>

                <div class="p-6 border-t border-gray-50">
                    <button @click="fazerLogout"
                        class="w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-red-400 hover:bg-red-50">
                        <i class="fa-solid fa-right-from-bracket"></i> Sair
                    </button>
                </div>
            </aside>

            <main class="flex-1 overflow-y-auto p-4 lg:p-12 relative">
                <div class="lg:hidden h-14"></div>

                <component :is="telaAtual + '-view'" :produtos="produtos" :vendas="vendas" :canais="canais" :kpis="kpis"
                    :taxas="taxas" :user-role="userRole" @refresh="carregarDados" @notificar="mostrarFeedback">
                </component>
            </main>
        </div>

        <div v-if="feedback.ativo"
            class="fixed top-6 left-0 right-0 z-[100] flex justify-center px-4 animate-slide-down">
            <div
                class="bg-slate-900 text-white p-6 rounded-[2.5rem] shadow-2xl border border-slate-700 min-w-[300px] max-w-md w-full flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center shrink-0">
                    <i class="fa-solid fa-check text-white"></i>
                </div>
                <div>
                    <h4 class="font-bold text-blue-400 uppercase text-[10px] tracking-widest mb-0.5">{{ feedback.titulo
                        }}</h4>
                    <p class="text-slate-300 text-sm font-medium leading-tight">{{ feedback.texto }}</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.API_URL = 'https://marketplacemanagement-hzhygwdfaxfnbnga.brazilsouth-01.azurewebsites.net';
    </script>
    <script type="module" src="./assets/js/app.js"></script>
</body>

</html>
