<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    
    <script>
        // CONFIGURAÇÃO OFICIAL DO SEU PROJETO
        const SUPABASE_URL = 'https://ucnielenhniqsgvfmygl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjbmllbGVuaG5pcXNndmZteWdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY1NDMzMzgsImV4cCI6MjA4MjExOTMzOH0.NZjAofrAc0PqeVC__8-XX_8ZwYHjC4_A77lj9sMgg1w';
        window.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

</head>
<body class="h-screen overflow-hidden">
    <div id="app" class="h-full">
        <login-view v-if="!session" @logged="onLogin"></login-view>

        <div v-else class="flex h-full w-full">
            <aside class="w-72 bg-white border-r border-gray-100 flex flex-col shadow-xl z-30">
                <div class="p-10 font-bold text-xl flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-cloud"></i></div>
                    PerfumeCloud
                </div>
                <nav class="flex-1 px-4">
                    <button v-for="t in menu" @click="navegar(t.id)" :class="telaAtual === t.id ? 'bg-blue-50 text-blue-600' : 'text-gray-400'" class="sidebar-item">
                        <i :class="t.icon"></i> {{ t.label }}
                    </button>
                </nav>
                <div class="p-6 border-t border-gray-50">
                    <button @click="fazerLogout" class="sidebar-item text-red-400 hover:bg-red-50"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
                </div>
            </aside>

            <main class="flex-1 overflow-y-auto p-12 relative bg-[#f8fafc]">
                <component 
                    :is="telaAtual + '-view'" 
                    :produtos="produtos" 
                    :vendas="vendas" 
                    :kpis="kpis" 
                    @refresh="carregarDados" 
                    @notificar="mostrarFeedback">
                </component>
            </main>
        </div>

        <div v-if="feedback.aberto" class="fixed inset-0 z-[300] bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4">
            <div class="bg-white rounded-[2.5rem] p-8 max-w-xs w-full text-center shadow-2xl animate-fade-in">
                <div class="w-16 h-16 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl"><i class="fa-solid fa-check"></i></div>
                <h4 class="text-xl font-bold mb-2 text-slate-900">{{ feedback.titulo }}</h4>
                <p class="text-gray-500 text-sm mb-6">{{ feedback.mensagem }}</p>
                <button @click="feedback.aberto = false" class="btn-primary w-full py-3">OK</button>
            </div>
        </div>
    </div>
    <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
